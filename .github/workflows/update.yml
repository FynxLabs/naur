name: Update Repo

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [release]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools zstd curl jq

      - name: Clean stale packages
        run: rm -rf x86_64 && mkdir -p x86_64

      - name: Fetch FynxLabs release packages
        run: ./mise/tasks/fetch --force

      - name: Build AUR packages (nody-greeter, shikai-theme)
        run: |
          docker run --rm -v "$PWD/x86_64:/out" -v "$PWD/mise/tasks:/tasks" archlinux:latest bash /tasks/fetch-aur-docker

      - name: Build repo database (repo-add)
        run: |
          docker run --rm -v "$PWD/x86_64:/out" archlinux:latest bash -c '
            cd /out
            rm -f naur.{db,files}{,.tar.gz,.tar.gz.old}
            repo-add "naur.db.tar.gz" *.pkg.tar.zst
            echo "==> $(ls *.pkg.tar.zst | wc -l) packages in repo"
          '

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: x86_64

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
