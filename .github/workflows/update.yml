name: Update Repo

on:
  schedule:
    # Daily at 06:00 UTC — catches new dusk/umbra/ember/rwr releases
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Manual trigger via GitHub Actions UI
  repository_dispatch:
    # Triggered by dusk/umbra/ember/rwr release workflows
    types: [release]

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools zstd

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install mise
        run: curl https://mise.run | sh

      - name: Install tools
        run: ~/.local/bin/mise install

      - name: Fetch FynxLabs release packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ~/.local/bin/mise run fetch -- --force

      - name: Build AUR packages (nody-greeter, shikai-theme)
        run: |
          docker run --rm -v "$PWD/x86_64:/out" -v "$PWD/mise/tasks:/tasks" archlinux:latest bash /tasks/fetch-aur-docker

      - name: Mirror xlibre
        run: ~/.local/bin/mise run mirror-xlibre

      - name: Build repo database (repo-add)
        run: |
          docker run --rm -v "$PWD/x86_64:/out" archlinux:latest bash -c '
            cd /out
            rm -f naur.{db,files}{,.tar.gz,.tar.gz.old}
            repo-add "naur.db.tar.gz" *.pkg.tar.zst
            echo "==> $(ls *.pkg.tar.zst | wc -l) packages in repo"
          '

      - name: Publish to gh-pages
        run: |
          git config --global user.name "FynxLabs Bot"
          git config --global user.email "bot@fynxlabs.dev"
          ~/.local/bin/mise run publish
